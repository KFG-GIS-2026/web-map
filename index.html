<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kühle Karte Neckargemünd</title>
  <link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/style.css" />
</head>
<body>

  <div id="sidebar">
    <h2>Kühle Orte</h2>

    <h3>Natur</h3>
    <label class="filter-item" id="lbl-forest">
      <input type="checkbox" class="filter-cb" data-cat="forest" checked />
      <span class="legend-icon" style="background:#2E7D32">🌲</span>
      <span class="filter-label">Wälder</span>
    </label>
    <label class="filter-item" id="lbl-water">
      <input type="checkbox" class="filter-cb" data-cat="water" checked />
      <span class="legend-icon" style="background:#1E88E5">💧</span>
      <span class="filter-label">Wasser &amp; Flüsse</span>
    </label>
    <label class="filter-item" id="lbl-park">
      <input type="checkbox" class="filter-cb" data-cat="park" checked />
      <span class="legend-icon" style="background:#66BB6A">🏞️</span>
      <span class="filter-label">Parks</span>
    </label>

    <h3>Freizeit</h3>
    <label class="filter-item" id="lbl-playground">
      <input type="checkbox" class="filter-cb" data-cat="playground" checked />
      <span class="legend-icon" style="background:#FF7043">🛝</span>
      <span class="filter-label">Spielplätze</span>
    </label>
    <label class="filter-item" id="lbl-bench">
      <input type="checkbox" class="filter-cb" data-cat="bench" checked />
      <span class="legend-icon" style="background:#8D6E63">🪑</span>
      <span class="filter-label">Bänke</span>
    </label>

    <h3>Wasser / Brunnen</h3>
    <label class="filter-item" id="lbl-fountain">
      <input type="checkbox" class="filter-cb" data-cat="fountain" checked />
      <span class="legend-icon" style="background:#2196F3">⛲</span>
      <span class="filter-label">Brunnen</span>
    </label>
    <label class="filter-item" id="lbl-drinking">
      <input type="checkbox" class="filter-cb" data-cat="drinking" checked />
      <span class="legend-icon" style="background:#29B6F6">🚰</span>
      <span class="filter-label">Trinkwasser</span>
    </label>

    <h3>Verkehr &amp; Gebäude</h3>
    <label class="filter-item" id="lbl-busstop">
      <input type="checkbox" class="filter-cb" data-cat="busstop" checked />
      <span class="legend-icon" style="background:#FFB300">🚌</span>
      <span class="filter-label">Bushaltestellen</span>
    </label>
    <label class="filter-item" id="lbl-building">
      <input type="checkbox" class="filter-cb" data-cat="building" />
      <span class="legend-icon" style="background:#FF9800">🏛️</span>
      <span class="filter-label">Öffentl. Gebäude</span>
    </label>

    <h3>Kartenstil</h3>
    <select id="basemap-select">
      <option value="streets">Streets</option>
      <option value="satellite">Satellite</option>
    </select>
  </div>

  <div id="map"></div>

  <!-- Shadow bar at the bottom -->
  <div id="shadow-bar">
    <button id="shadow-bar-toggle" title="Schattenebene ein-/ausblenden">
      🕒 Schatten
    </button>
    <div id="shadow-panel">
      <span id="shadow-time"></span>
      <input type="range" id="shadow-slider" min="6" max="20" step="1" />
      <button id="shadow-hide" title="Schließen">✕</button>
    </div>
  </div>

  <a id="gh-link" href="https://github.com/leonfallair/kuehle-karte-neckarg" target="_blank" rel="noopener">
    <svg height="16" viewBox="0 0 16 16" width="16" fill="currentColor">

        -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
        .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
        -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.67 7.67 0 0 1 2-.27
        c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
        .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
        0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>

  <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
  <!-- Module-Reihenfolge: config → shadow → pois → map (Einstiegspunkt) -->
  <script src="src/js/config.js"></script>
  <script src="src/js/shadow.js"></script>
  <script src="src/js/pois.js"></script>
  <script src="src/js/map.js"></script>
</body>
</html>
