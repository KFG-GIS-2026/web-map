<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kühle Karte Neckargemünd</title>
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/style.css?v=20260621-5" />
</head>
<body>


<div id="mode-switch-container">
  <span class="mode-label inactive">Einfach</span>

  <label class="switch">
    <input type="checkbox" id="mode-toggle">
    <span class="slider"></span>
  </label>

  <span class="mode-label active">Komplex</span>
</div>

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Kühle Orte</h2>
      <button id="sidebar-toggle" title="Legende ein-/ausblenden" aria-label="Legende ein-/ausblenden">
        ✕
      </button>
    </div>

    <div id="shadow-date-section">
      <h3>Schattenzeit</h3>
      <label class="shadow-date-control" for="shadow-date">
        <span>Datum</span>
        <input type="date" id="shadow-date" title="Datum auswählen" />
      </label>
      <button id="shadow-today" title="Auf heute springen">Heute</button>
    </div>

    <div id="sidebar-content">
      <h3>Freizeit &amp; Erholung</h3>

      <label class="filter-item" id="lbl-playground">
        <input type="checkbox" class="filter-cb" data-cat="playground" checked />
        <span class="legend-icon"><img src="https://kfg-gis-2026.github.io/web-map-data/poi_symbols/001-slide.png" alt="" /></span>
        <span class="filter-label">Spielplatz</span>
      </label>

      <label class="filter-item" id="lbl-park">
        <input type="checkbox" class="filter-cb" data-cat="park" checked />
        <span class="legend-icon"><img src="https://kfg-gis-2026.github.io/web-map-data/poi_symbols/002-park.png" alt="" /></span>
        <span class="filter-label">Park</span>
      </label>

      <label class="filter-item" id="lbl-bench">
        <input type="checkbox" class="filter-cb" data-cat="bench" checked />
        <span class="legend-icon"><img src="https://kfg-gis-2026.github.io/web-map-data/poi_symbols/003-bank.png" alt="" /></span>
        <span class="filter-label">Sitzbank</span>
      </label>

      <h3>Wasser</h3>

      <label class="filter-item" id="lbl-drinking">
        <input type="checkbox" class="filter-cb" data-cat="drinking" checked />
        <span class="legend-icon"><img src="https://kfg-gis-2026.github.io/web-map-data/poi_symbols/004-water.png" alt="" /></span>
        <span class="filter-label">Trinkwasser</span>
      </label>

      <label class="filter-item" id="lbl-fountain">
        <input type="checkbox" class="filter-cb" data-cat="fountain" checked />
        <span class="legend-icon"><img src="https://kfg-gis-2026.github.io/web-map-data/poi_symbols/007-fountain.png" alt="" /></span>
        <span class="filter-label">Brunnen</span>
      </label>

      <h3>Gebäude</h3>

      <label class="filter-item" id="lbl-toilet">
        <input type="checkbox" class="filter-cb" data-cat="toilet" checked />
        <span class="legend-icon"><img src="https://kfg-gis-2026.github.io/web-map-data/poi_symbols/005-toilet.png" alt="" /></span>
        <span class="filter-label">Toilette</span>
      </label>

      <label class="filter-item" id="lbl-church">
        <input type="checkbox" class="filter-cb" data-cat="church" checked />
        <span class="legend-icon"><img src="https://kfg-gis-2026.github.io/web-map-data/poi_symbols/006-church.png" alt="" /></span>
        <span class="filter-label">Kirche</span>
      </label>

      <label class="filter-item" id="lbl-library">
        <input type="checkbox" class="filter-cb" data-cat="library" checked />
        <span class="legend-icon"><img src="https://kfg-gis-2026.github.io/web-map-data/poi_symbols/008-open-book.png" alt="" /></span>
        <span class="filter-label">Bücherei</span>
      </label>

      <label class="filter-item" id="lbl-museum">
        <input type="checkbox" class="filter-cb" data-cat="museum" checked />
        <span class="legend-icon"><img src="https://kfg-gis-2026.github.io/web-map-data/poi_symbols/009-museum-art.png" alt="" /></span>
        <span class="filter-label">Museum</span>
      </label>
    </div>
  </div>

  <!-- Floating button to reopen sidebar when collapsed -->
  <button id="sidebar-open" title="Legende öffnen" aria-label="Legende öffnen">
    🗂️
  </button>
  
  <div id="map"></div>

  <div id="three-d-hint" aria-label="Hinweis zur 3D Steuerung">
    <button id="three-d-hint-toggle" type="button" aria-expanded="true" title="3D Hinweis ein-/ausklappen">
      <span class="three-d-toggle-label">❯</span>
    </button>

    <div class="three-d-hint-content">
      <div class="three-d-preview" aria-hidden="true">
        <div class="preview-ground"></div>
        <div class="preview-building building-a"></div>
        <div class="preview-building building-b"></div>
        <div class="preview-building building-c"></div>
      </div>
      <div class="three-d-hint-text">
        <strong>3D drehen</strong>
        <span>Rechte Maustaste halten u. ziehen.</span>
      </div>
    </div>
  </div>

  <!-- ── Shadow Bar ── -->
  <div id="shadow-bar">
    <button id="shadow-bar-toggle" title="Schatten ein-/ausblenden">
      🕒 Schatten
    </button>

    <div id="shadow-panel" class="hidden">
      <span id="shadow-time">12:00 Uhr</span>
      <button id="shadow-play" title="Animation starten/stoppen">▶</button>
      <input type="range" id="shadow-slider" min="0" max="14" step="1" value="6" />
      <button id="shadow-hide" title="Schließen">✕</button>
    </div>
  </div>

  <a id="gh-link" href="https://github.com/KFG-GIS-2026/web-map"
     target="_blank" rel="noopener">
    <svg height="16" viewBox="0 0 16 16" width="16" fill="currentColor">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
        0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
        -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
        .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
        -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.67 7.67 0 0 1 2-.27
        c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
        .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
        0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
    </svg>
    GitHub
  </a>

  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <script src="src/js/config.js?v=20260621-5"></script>
  <script src="src/js/boundary.js?v=20260621-5"></script>
  <script src="src/js/shadow.js?v=20260621-5"></script>
  <script src="src/js/pois.js?v=20260621-5"></script>
  <script src="src/js/map.js?v=20260621-5"></script>
</body>
</html>
